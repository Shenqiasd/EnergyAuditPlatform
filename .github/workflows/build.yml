name: Build

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  # ----------------------------------------------------------------------
  # REQUIRED — must pass for PRs to be merged
  # ----------------------------------------------------------------------

  frontend-build:
    name: Frontend build (audit-ui)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: audit-ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        env:
          npm_config_registry: https://registry.npmmirror.com

      - name: Vite build
        run: npx vite build

  backend-compile:
    name: Backend compile (maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Maven compile
        run: mvn -B -ntp -DskipTests compile

  backend-tests:
    name: Backend tests (JUnit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run unit tests
        run: mvn -B -ntp test

      - name: Upload backend coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-reports
          path: '**/target/site/jacoco/'
          if-no-files-found: ignore

  frontend-unit-tests:
    name: Frontend unit tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: audit-ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: audit-ui/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        env:
          npm_config_registry: https://registry.npmmirror.com

      - name: Run Vitest
        run: npm run test:unit

  frontend-e2e-smoke:
    name: Frontend E2E smoke (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: audit-ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: audit-ui
        run: npm install --no-audit --no-fund
        env:
          npm_config_registry: https://registry.npmmirror.com

      - name: Install Playwright browser
        working-directory: audit-ui
        run: npx playwright install --with-deps chromium

      - name: Start Docker stack
        env:
          MYSQL_ROOT_PASSWORD: root
          JWT_SECRET: energy-audit-ci-secret-key-minimum-256-bits-long
        run: docker compose up -d --build

      - name: Wait for frontend
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1/login >/dev/null; then
              echo "Frontend is ready"
              exit 0
            fi
            echo "Waiting for frontend... ($i/60)"
            sleep 5
          done
          docker compose logs
          exit 1

      - name: Run Playwright smoke tests
        working-directory: audit-ui
        env:
          E2E_BASE_URL: http://127.0.0.1
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: audit-ui/playwright-report/
          if-no-files-found: ignore

      - name: Stop Docker stack
        if: always()
        run: docker compose down -v

  # ----------------------------------------------------------------------
  # ADVISORY — reported but does not block merges.
  # Intent: give visibility into drift (type errors / lint warnings / SQL
  # style issues / migration correctness) without breaking the existing
  # build. These will be promoted to required checks in a follow-up once
  # the existing debt is cleaned up.
  #
  # NOTE on sql-migrations: several existing migrations use `ALTER TABLE
  # ... ADD COLUMN IF NOT EXISTS` which is not supported by vanilla MySQL
  # 8.0 (only MariaDB / some Railway MySQL flavors). This advisory job
  # exposes that drift so a fresh bootstrap of the schema (e.g. Tencent
  # Cloud) doesn't silently fail.
  # ----------------------------------------------------------------------

  sql-migrations:
    name: SQL migrations (dry-run on empty MySQL 8.0, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: audit_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -proot --silent; then
              echo "MySQL is ready"
              exit 0
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
          echo "MySQL failed to start" >&2
          exit 1

      - name: Apply migrations in order
        env:
          MYSQL_PWD: root
        run: |
          set -e
          shopt -s nullglob
          # Apply 00-schema.sql first (baseline) then all numbered migrations
          # in lexical order. The [0-9]* glob excludes sql/schema.sql, which
          # would otherwise sort last ('s' > '2') and its DROP TABLE statements
          # would undo every incremental migration applied before it.
          failed=0
          for f in $(ls sql/[0-9]*.sql | sort); do
            echo "::group::Applying $f"
            if mysql -h 127.0.0.1 -P 3306 -uroot audit_test < "$f"; then
              echo "OK: $f"
            else
              echo "::error file=$f::Migration failed"
              failed=1
            fi
            echo "::endgroup::"
          done
          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

      - name: Verify key tables exist
        env:
          MYSQL_PWD: root
        run: |
          mysql -h 127.0.0.1 -P 3306 -uroot audit_test -e "
            SELECT COUNT(*) AS tpl_tag_mapping_rows FROM tpl_tag_mapping;
            SELECT COUNT(*) AS ent_enterprise_rows FROM ent_enterprise;
            SHOW COLUMNS FROM tpl_submission LIKE 'review_comment';
          "

  frontend-typecheck:
    name: Frontend typecheck (vue-tsc, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: audit-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        env:
          npm_config_registry: https://registry.npmmirror.com

      - name: Run vue-tsc
        run: npm run typecheck

  frontend-lint:
    name: Frontend lint (eslint, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: audit-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        env:
          npm_config_registry: https://registry.npmmirror.com

      - name: Run eslint
        run: npm run lint

  sql-lint:
    name: SQL lint (sqlfluff, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install sqlfluff
        run: pip install 'sqlfluff==3.0.7'

      - name: Run sqlfluff
        run: sqlfluff lint sql/ --dialect mysql --nofail --disable-progress-bar
